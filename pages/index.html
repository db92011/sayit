<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SayIt!</title>
    <meta
      name="description"
      content="SayIt! helps you say the hard thing clearly, calmly, and in your own voice."
    />
    <meta name="theme-color" content="#0b0f14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SayIt!" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "SF Pro Display",
          system-ui,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
        background: #0b0f14;
        color: rgba(255, 255, 255, 0.92);
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .handoff {
        width: min(100%, 460px);
        padding: 22px 20px;
        border-radius: 22px;
        background: rgba(17, 24, 39, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.04;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: rgba(226, 232, 240, 0.88);
      }

      a {
        color: #8bc9ff;
      }
    </style>
    <script>
      (function () {
        var url = new URL(window.location.href);
        var next = new URL("/app", window.location.origin);

        for (var entry of url.searchParams.entries()) {
          next.searchParams.set(entry[0], entry[1]);
        }

        if (!next.searchParams.has("source")) {
          next.searchParams.set("source", "pwa");
        }

        window.location.replace(next.toString());
      })();
    </script>
  </head>
  <body>
    <main class="handoff">
      <h1>Opening SayIt!</h1>
      <p>
        If the app does not open automatically, continue to
        <a id="open-app-link" href="/app?source=pwa">the standalone app</a>.
      </p>
    </main>
  </body>
</html>
